name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inyectar credenciales
        run: |
          sed -i "s|%%AWS_KEY_ID%%|${{ secrets.AWS_KEY_ID }}|g" index.html
          sed -i "s|%%AWS_SECRET_KEY%%|${{ secrets.AWS_SECRET_KEY }}|g" index.html

      - name: Deploy a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .